name: 자격증 합격 인증
description: 자격증 합격을 인증합니다
title: "[🎉합격] 자격증 이름"
labels: ["cert-pass"]

body:
  - type: textarea
    id: certification_proof
    attributes:
      label: 합격 인증
      description: 실제 합격 여부를 확인할 수 있도록 결과 사진을 첨부해주세요.
      placeholder: |
        사진을 첨부한 뒤, 필요한 경우 짧게 설명을 남겨주세요.
    validations:
      required: true

  - type: textarea
    id: certification_review
    attributes:
      label: 자격증 후기
      description: 시험을 보고 느낀 점을 자유롭게 작성해주세요.
      placeholder: |
        느낀 점, 공부 방법, 아쉬웠던 점, 다음 계획 등을 자유롭게 작성해주세요.
    validations:
      required: false
